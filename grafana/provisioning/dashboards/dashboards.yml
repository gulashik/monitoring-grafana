apiVersion: 1

providers:
  - name: node-exporter-dashboards
    orgId: 1
    folder: Node Exporter
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/node-exporters-folder # замапили папку provisioning в compose.yml
      foldersFromFilesStructure: false
  - name: json-dashboards
    orgId: 1
    folder: JSON
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json-folder # замапили папку provisioning в compose.yml
      foldersFromFilesStructure: false
  - name: csv-dashboards
    orgId: 1
    folder: CSV
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/csv-folder # замапили папку provisioning в compose.yml
      foldersFromFilesStructure: false
  - name: mixed-dashboards
    orgId: 1
    folder: Mixed
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/mixed-folder # замапили папку provisioning в compose.yml
      foldersFromFilesStructure: false
