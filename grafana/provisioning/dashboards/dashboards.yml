apiVersion: 1

providers:
  - name: node-exporter-dashboards
    orgId: 1
    folder: Node Exporter
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards # замапили папку с .json в compose.yml
      foldersFromFilesStructure: false

