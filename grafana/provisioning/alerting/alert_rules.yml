apiVersion: 1

groups:
  - orgId: 1
    name: demo-grafana-alerting
    folder: Demo Alerting
    interval: 30s
    rules:
      - uid: nginx-exporter-down-grafana
        title: NginxExporterDown
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: 1 - up{job="nginx-exporter"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 1m
        annotations:
          summary: "Grafana не видит nginx-exporter"
          description: "Prometheus возвращает 1 - up{job=\"nginx-exporter\"} > 0. Проверьте контейнер nginx-exporter и target в Prometheus."
          runbook_url: "http://localhost:9090/targets?search=nginx-exporter"
        labels:
          severity: warning
          service: nginx-exporter
          source: grafana
        isPaused: false
